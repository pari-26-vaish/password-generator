<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="palette"></div>

<div id="controls">
    <button id="generate-btn">Generate (Space)</button>
    <button id="download-btn">Download PNG</button>
    <button id="save-btn">Save Favorite</button>
    <button id="share-btn">Share Palette</button>
    <button id="theme-btn">Toggle Theme</button>
</div>

<div id="favorites"></div>

<div id="gradient-panel">
    <h3>Gradient Generator</h3>
    <div class="gradient-controls">
        <select id="grad-color-a"></select>
        <select id="grad-color-b"></select>
        <button id="copy-gradient-btn">Copy CSS</button>
    </div>
    <div id="gradient-preview"></div>
    <code id="gradient-css-output"></code>
</div>

<script src="script.js"></script>
</body>
</html>
